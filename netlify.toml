[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback: every route serves index.html with a 200 so React Router
# can take over client-side. Without this, deep-linking to /tripsync,
# /lumis, /axs, or /neighbourlah would return Netlify's 404 page.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
