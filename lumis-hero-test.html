<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lumis Skincare Hero — Scroll Reveal</title>
<style>
  :root {
    --bg: #0D0D0D;
    --fg: #EBEBE5;
    --muted: #888884;
    /* Match the TripSync hero phone animation. */
    --enter-ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    --enter-duration: 1.2s;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .hero {
    padding: 120px 80px;
    display: flex;
    flex-direction: column;
    gap: 60px;
  }

  .hero__title {
    font-family: 'Playfair Display', 'Times New Roman', serif;
    font-weight: 400;
    font-size: clamp(48px, 7vw, 96px);
    letter-spacing: -0.02em;
    line-height: 0.95;
    margin: 0;
  }

  .hero__tagline {
    font-size: clamp(16px, 2vw, 20px);
    color: var(--muted);
    margin: 0;
    line-height: 1.5;
  }

  /* ── Device showcase ────────────────────────────────────────────── */

  .showcase {
    position: relative;
    width: 100%;
    max-width: 1280px;
    margin: 0 auto;
    /* Aspect ratio chosen so the two overlapping devices (each 52% wide,
       aspect 1.5) sit naturally in the frame. width 100% × 0.52 × (1/1.5)
       = ~34.7% — but vertical breathing room above/below brings us to ~50%. */
    aspect-ratio: 1280 / 640;
  }

  .device {
    position: absolute;
    top: 50%;
    transform-origin: 50% 50%;
    /* Resting position: vertically centered. */
    transform: translate(0, -50%) scale(1);
    opacity: 0;
    will-change: transform, opacity;
    pointer-events: none;
  }

  .device img {
    display: block;
    width: 100%;
    height: auto;
    user-select: none;
  }

  /* ── iPad ──────────────────────────────────────────────────────── */
  /* In front, on the LEFT, layered over the MacBook's left edge.
     Width 55% and left 0% → spans 0%–55% of the showcase. */
  .device--ipad {
    /* iPad shrunk to 49.5% (10% smaller than the previous 55%).
       Nudged down 5% of showcase height (top: 55% instead of the
       shared 50%) for a slightly lower, layered look. */
    left: 5%;
    top: 55%;
    width: 49.5%;
    z-index: 2;
    transform: translate(-100vw, calc(-50% + 20px)) scale(0.95);
    transition:
      transform var(--enter-duration) var(--enter-ease) 0s,
      opacity   var(--enter-duration) var(--enter-ease) 0s;
  }

  /* ── MacBook ────────────────────────────────────────────────────── */
  /* Behind, on the RIGHT, animates at the SAME time as the iPad.
     Width 60.5% (10% larger) and left 38% (shifted right by 5%) →
     spans 38%–98.5%. */
  .device--laptop {
    left: 38%;
    width: 60.5%;
    z-index: 1;
    transform: translate(100vw, calc(-50% + 20px)) scale(0.95);
    transition:
      transform var(--enter-duration) var(--enter-ease) 0s,
      opacity   var(--enter-duration) var(--enter-ease) 0s;
  }

  /* ── Revealed state ─────────────────────────────────────────────── */
  .device.is-in {
    opacity: 1;
    transform: translate(0, -50%) scale(1);
  }

  /* ── Responsive ─────────────────────────────────────────────────── */
  @media (max-width: 1024px) {
    .hero { padding: 80px 40px; }
    /* Keep the same ~18% overlap proportion at every breakpoint. */
    .device--ipad   { left: 0%;  width: 58%; }
    .device--laptop { left: 42%; width: 58%; }
  }

  @media (max-width: 640px) {
    .hero { padding: 60px 20px; }
    .device--ipad   { left: 0%;  width: 62%; }
    .device--laptop { left: 38%; width: 62%; }
  }

  /* ── Reduced motion: show final state instantly ─────────────────── */
  @media (prefers-reduced-motion: reduce) {
    .device {
      transition: none !important;
      opacity: 1;
      transform: translate(0, -50%) scale(1);
    }
  }
</style>
</head>
<body>

  <section class="hero" id="hero">
    <div>
      <h1 class="hero__title">Lumis Skincare</h1>
      <p class="hero__tagline">A Calm, Considered E-Commerce Experience for Skincare Discovery</p>
    </div>

    <div class="showcase" id="showcase">
      <!-- MacBook (back, right, slides in from right) -->
      <div class="device device--laptop">
        <img src="./src/imports/Lumis_laptop_v2.png" alt="Lumis Skin Match page on a MacBook" />
      </div>

      <!-- iPad (front, left, slides in from left) -->
      <div class="device device--ipad">
        <img src="./src/imports/Lumis_ipad.png" alt="Lumis homepage on an iPad" />
      </div>
    </div>
  </section>

<script>
  (() => {
    const showcase = document.getElementById('showcase');
    if (!showcase) return;
    const devices = showcase.querySelectorAll('.device');
    if (!devices.length) return;

    const reveal = () => devices.forEach(d => d.classList.add('is-in'));

    // Reduced motion: skip animation, show final state immediately.
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)');
    if (reduce.matches || !('IntersectionObserver' in window)) {
      reveal();
      return;
    }

    const io = new IntersectionObserver((entries, observer) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          reveal();
          observer.unobserve(entry.target); // fire once
        }
      });
    }, { threshold: 0.2 });

    io.observe(showcase);
  })();
</script>

</body>
</html>
