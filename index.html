
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta name="description" content="Portfolio of Nur Leeyana, a UI/UX designer specialising in healthcare and digital product design." />
      <title>Nur Leeyana - UI/UX Designer</title>

      <!-- Favicon: NL monogram served from /public so it's at a stable URL -->
      <link rel="icon" type="image/svg+xml" href="/nl-monogram.svg" />

      <!-- Preconnect to Google Fonts so DNS + TLS handshake completes
           before the CSS @import requests the font files. Saves ~100-300ms
           of font-blocked rendering on first paint. -->
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      <!-- Social / OpenGraph card preview (Facebook, LinkedIn, iMessage, Slack…) -->
      <meta property="og:type" content="website" />
      <meta property="og:site_name" content="Nur Leeyana" />
      <meta property="og:url" content="https://www.nurleeyana.com/" />
      <meta property="og:title" content="Nur Leeyana - UI/UX Designer" />
      <meta property="og:description" content="Portfolio of Nur Leeyana, a UI/UX designer specialising in healthcare and digital product design." />
      <meta property="og:image" content="https://www.nurleeyana.com/og-image.jpg" />
      <meta property="og:image:width" content="1179" />
      <meta property="og:image:height" content="663" />
      <meta property="og:image:alt" content="Nur Leeyana - UI/UX Designer" />

      <!-- Twitter / X card -->
      <meta name="twitter:card" content="summary_large_image" />
      <meta name="twitter:title" content="Nur Leeyana - UI/UX Designer" />
      <meta name="twitter:description" content="Portfolio of Nur Leeyana, a UI/UX designer specialising in healthcare and digital product design." />
      <meta name="twitter:image" content="https://www.nurleeyana.com/og-image.jpg" />
      <style>html, body { height: 100%; margin: 0; background-color: #0D0D0D; overflow-x: clip; } #root { height: 100%; }</style>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
